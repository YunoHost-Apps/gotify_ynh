#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "gotify"
name = "Gotify"
description.en = "Simple server for sending and receiving messages"
description.fr = "Simple serveur pour envoyer et recevoir des messages"

version = "2.9.1~ynh1"

maintainers = ["plopoyop"]

[upstream]
license = "MIT"
website = "http://gotify.net"
admindoc = "https://gotify.net/docs/index"
code = "https://github.com/gotify/server"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/gotify"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"

[resources]
    [resources.sources.main]
    in_subdir = false
    armhf.url = "https://github.com/gotify/server/releases/download/v2.9.1/gotify-linux-arm-7.zip"
    armhf.sha256 = "1f8128ca89e45da5cc321160786a6094cba648b0a36f95686d0880e0734d3f3c"
    arm64.url = "https://github.com/gotify/server/releases/download/v2.9.1/gotify-linux-arm64.zip"
    arm64.sha256 = "f8c16cec664d59033e1588c766b3ef45d5c7c39bb995ca6deba298cd2b1db268"
    amd64.url = "https://github.com/gotify/server/releases/download/v2.9.1/gotify-linux-amd64.zip"
    amd64.sha256 = "34707b68f6e2b1be69458a7974e9d0e1acbfaa7a95d7349eed9219c9f215c4b3"
    i386.url = "https://github.com/gotify/server/releases/download/v2.9.1/gotify-linux-386.zip"
    i386.sha256 = "1f0ee4c1aaaf477e37ac9d582f67a445e4d8cc79cd6cfbb984bea85906437ebc"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.armhf = "gotify-linux-arm-7.zip"
    autoupdate.asset.arm64 = "gotify-linux-arm64.zip"
    autoupdate.asset.amd64 = "gotify-linux-amd64.zip"
    autoupdate.asset.i386 = "gotify-linux-386.zip"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]
    subdirs = ["images", "plugins"]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "mariadb-server"

    [resources.database]
    type = "mysql"
