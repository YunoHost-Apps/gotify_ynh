#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "gotify"
name = "Gotify"
description.en = "Simple server for sending and receiving messages"
description.fr = "Simple serveur pour envoyer et recevoir des messages"

version = "2.7.2~ynh1"

maintainers = ["plopoyop"]

[upstream]
license = "MIT"
website = "http://gotify.net"
admindoc = "https://gotify.net/docs/index"
code = "https://github.com/gotify/server"

[integration]
yunohost = ">= 12.0.9"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false

sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/gotify"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"

[resources]
    [resources.sources.main]
    in_subdir = false
    armhf.url = "https://github.com/gotify/server/releases/download/v2.7.2/gotify-linux-arm-7.zip"
    armhf.sha256 = "5ed8fd30d1884077249e73eb31f92bf689167cffbb3a264e0b616e04b5cd17ac"
    arm64.url = "https://github.com/gotify/server/releases/download/v2.7.2/gotify-linux-arm64.zip"
    arm64.sha256 = "2a3a53ddc89835ec15ee5c298344b48bfcb15f92dbb4796300538ea0f4652fa9"
    amd64.url = "https://github.com/gotify/server/releases/download/v2.7.2/gotify-linux-amd64.zip"
    amd64.sha256 = "a175695237aabfb46fb46cefae863e01a9b98d99cf00669d2821757ef62e27df"
    i386.url = "https://github.com/gotify/server/releases/download/v2.7.2/gotify-linux-386.zip"
    i386.sha256 = "f8946b6cbe525480fda40203ef362db72b8e87bc3ef8925f66df1dd7ab96c95e"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.armhf = "gotify-linux-arm-7.zip"
    autoupdate.asset.arm64 = "gotify-linux-arm64.zip"
    autoupdate.asset.amd64 = "gotify-linux-amd64.zip"
    autoupdate.asset.i386 = "gotify-linux-386.zip"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]
    subdirs = ["images", "plugins"]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "mariadb-server"

    [resources.database]
    type = "mysql"
