#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "gotify"
name = "Gotify"
description.en = "Simple server for sending and receiving messages"
description.fr = "Simple serveur pour envoyer et recevoir des messages"

version = "2.7.3~ynh1"

maintainers = ["plopoyop"]

[upstream]
license = "MIT"
website = "http://gotify.net"
admindoc = "https://gotify.net/docs/index"
code = "https://github.com/gotify/server"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/gotify"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"

[resources]
    [resources.sources.main]
    in_subdir = false
    armhf.url = "https://github.com/gotify/server/releases/download/v2.7.3/gotify-linux-arm-7.zip"
    armhf.sha256 = "dc3b728c748467cbe60649c6da731637f5b5494c5c36b723c90d4584c60b54fd"
    arm64.url = "https://github.com/gotify/server/releases/download/v2.7.3/gotify-linux-arm64.zip"
    arm64.sha256 = "7f52a0f37191ff25dd8e592a74d03aa296f13c2e03241f2e8d9bfe9ffb5cc543"
    amd64.url = "https://github.com/gotify/server/releases/download/v2.7.3/gotify-linux-amd64.zip"
    amd64.sha256 = "65cde2f5a138d80e10724d4d87704e64d8a26566e930a9fffc8cd12c5443103c"
    i386.url = "https://github.com/gotify/server/releases/download/v2.7.3/gotify-linux-386.zip"
    i386.sha256 = "549db772e0c94298c0e9fb2c8ec1b062b09b3042ad314c1af5ee7b2e96efe786"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.armhf = "gotify-linux-arm-7.zip"
    autoupdate.asset.arm64 = "gotify-linux-arm64.zip"
    autoupdate.asset.amd64 = "gotify-linux-amd64.zip"
    autoupdate.asset.i386 = "gotify-linux-386.zip"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]
    subdirs = ["images", "plugins"]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "mariadb-server"

    [resources.database]
    type = "mysql"
